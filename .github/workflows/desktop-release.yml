name: Desktop release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the draft release (e.g. desktop-v0.1.0)'
        required: true
        default: 'desktop-v0.0.0-test'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''
          - platform: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxss-dev \
            libssl-dev \
            build-essential \
            file \
            wget

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      # Import a self-signed code-signing cert into a temporary keychain so
      # `tauri build` can produce a properly signed .app + .dmg. Without this
      # the build is ad-hoc signed, which macOS TCC treats as unstable identity
      # and silently denies Screen Recording capture even when the toggle is on.
      # Skipped if the secret isn't set (build falls back to ad-hoc).
      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest' && env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo -n "$MACOS_CERTIFICATE" | base64 --decode --output "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 \
            -T /usr/bin/codesign

          # Grant codesign access to private keys without GUI prompts.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Put our keychain ahead of the default so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')

          # Sanity check — must print the imported identity. Note: `-v` is
          # omitted on purpose; self-signed certs aren't in the system trust
          # store, so `-v` would filter them out and print "0 valid identities".
          # codesign doesn't check trust state, only that the identity exists
          # and the private key is accessible.
          security find-identity -p codesigning "$KEYCHAIN_PATH"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_WEB_BASE_URL: ${{ vars.VITE_WEB_BASE_URL }}
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Hindsight ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'Hindsight desktop build. Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
