name: Desktop release

on:
  # Manual trigger only. We deliberately do NOT listen to `push: tags` because
  # publishing the draft release this workflow creates would itself create the
  # git tag (drafts have no tag until publish), which would re-fire this
  # workflow under your user account and burn another full set of build
  # minutes. Always trigger from the Actions tab.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the draft release (e.g. desktop-v0.1.0)'
        required: true
        default: 'desktop-v0.0.0-test'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''
          # ubuntu-24.04 (not 22.04): xcap pulls libspa 0.9, whose bindings
          # need a PipeWire newer than 22.04's 0.3.48. 24.04 ships PipeWire 1.x.
          # Trade-off: the Linux bundles now require glibc 2.39+, so they target
          # modern distros (24.04 / 25.x / 26.04) — the same Wayland systems the
          # capture crash affected — and no longer run on 22.04 and older.
          - platform: ubuntu-24.04
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxss-dev \
            libssl-dev \
            build-essential \
            file \
            wget \
            pkg-config \
            libclang-dev \
            libxcb1-dev \
            libxrandr-dev \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libegl-dev \
            libgbm-dev \
            libdrm-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      # macOS builds are intentionally left ad-hoc signed (no code-signing
      # identity imported). A self-signed cert was tried for TCC/Screen-Recording
      # stability, but macOS Gatekeeper distrusts it, so the auto-updater's
      # post-install relaunch was rejected ("signature verification failed", app
      # quits). Ad-hoc is what shipped before and what the in-app updater can
      # relaunch cleanly. Proper auto-update + Screen Recording both working
      # requires an Apple Developer ID cert + notarization (Developer Program) —
      # add that here, plus APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID on the
      # tauri-action step, when an account is available.

      # Notes for this release. If apps/desktop/RELEASE_NOTES.md exists and is
      # non-empty, its contents become the release body — which tauri-action
      # bakes into BOTH the GitHub release page and latest.json's `notes`
      # field, so the same text appears in the in-app auto-updater dialog.
      # Falls back to a generic line so a missing file doesn't break the build.
      - name: Read release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'body<<RELEASE_NOTES_EOF'
            if [ -s apps/desktop/RELEASE_NOTES.md ]; then
              cat apps/desktop/RELEASE_NOTES.md
            else
              echo 'Hindsight desktop build. Download the installer for your platform below.'
            fi
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_WEB_BASE_URL: ${{ vars.VITE_WEB_BASE_URL }}
          API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # No APPLE_SIGNING_IDENTITY: macOS is built ad-hoc on purpose (see the
          # note above the build steps) so the auto-updater can relaunch without
          # Gatekeeper rejecting an untrusted self-signed identity.
          # Updater signing — required for tauri-plugin-updater. The private
          # key is generated locally with `pnpm tauri signer generate` and
          # uploaded as a repo secret; the matching public key is embedded in
          # tauri.conf.json so installed apps can verify update bundles.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag }}
          releaseName: 'Hindsight ${{ github.event.inputs.tag }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          # Generates latest.json from the build artifacts and uploads it as a
          # release asset. The updater endpoint in tauri.conf.json points at
          # /releases/latest/download/latest.json — that URL only resolves
          # once the draft is promoted to a published release.
          includeUpdaterJson: true
          args: ${{ matrix.tauri-args }}
